name: '自动同步上游仓库（原生 Git）'
on:
  schedule:
    - cron: '0 7 * * 2,5'
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 Fork 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # 拉取完整历史，以便合并

      - name: 记录合并前的 HEAD
        id: before
        run: echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/develop202/kgcheckin.git
          git fetch upstream

      - name: 合并上游分支
        id: merge
        run: |
          git checkout main
          git merge upstream/main --no-edit  # 自动合并，不打开编辑器
        continue-on-error: true  # 允许合并失败，后续步骤可处理冲突

      - name: 记录合并后的 HEAD
        id: after
        run: echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: 推送更新到 Fork 仓库
        if: steps.merge.outcome == 'success'
        run: git push origin main

      - name: 输出同步结果
        run: |
          if [ "${{ steps.before.outputs.commit }}" = "${{ steps.after.outputs.commit }}" ]; then
            echo "当前分支已是最新，无新提交。"
          else
            echo "已同步新的提交。"
          fi

      - name: 合并失败时的提示（可选）
        if: steps.merge.outcome == 'failure'
        run: |
          echo "合并发生冲突，请手动解决。"
          exit 1
